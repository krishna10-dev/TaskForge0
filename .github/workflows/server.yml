name: Server CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'Server/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Server/**'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: Server/package-lock.json

    - name: Install dependencies
      run: npm install
      working-directory: Server

    - name: Run Tests
      run: npm test
      working-directory: Server
      continue-on-error: true # Kyunki abhi humne tests likhe nahi hain, toh ye error ignore karega

    # Optional: Yahan aap deployment steps add kar sakte hain (e.g., Render, Railway, AWS)
